name: Weekly alias data update

# -- WHEN this workflow runs ------------------------------------------------
on:
  # Cron schedule: "0 3 * * 0" = 03:00 UTC every Sunday.
  # GitHub uses UTC. Pick a quiet hour to be nice to NCBI's servers.
  schedule:
    - cron: "0 3 * * 0"
  # Lets you trigger the workflow manually from the "Actions" tab in GitHub.
  # Useful for testing without waiting for Sunday.
  workflow_dispatch:

# -- PERMISSIONS this workflow needs ----------------------------------------
# By default, workflows can only read the repo. We need "write" so we can
# create a Release and upload the data files to it.
permissions:
  contents: write

# -- WHAT this workflow does ------------------------------------------------
jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Pull the repo's code onto the runner so our scripts are available.
      - name: Check out repository
        uses: actions/checkout@v4

      # Step 2: Install Python 3.13 on the runner.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Step 3: Install certifi (needed for HTTPS in the collection script).
      - name: Install Python dependencies
        run: pip install certifi

      # Step 4: Download the NCBI Datasets CLI binary for Linux.
      # The runner is Ubuntu, so we grab the linux-amd64 build from NCBI's FTP.
      - name: Install NCBI Datasets CLI
        run: |
          curl -o datasets 'https://ftp.ncbi.nlm.nih.gov/pub/datasets/command-line/v2/linux-amd64/datasets'
          chmod +x datasets
          sudo mv datasets /usr/local/bin/
          datasets --version

      # Step 5: Run the collection script and produce aliases.tsv.gz
      # plus a structured failures.tsv. Output goes to the repo root so the
      # next steps can find it easily.
      - name: Run alias collection script
        run: |
          python scripts/collect_aliases.py \
            --output aliases.tsv.gz \
            --failures failures.tsv

      # Step 6: Build the SQLite database from the TSV.
      # This is the new step — converts the TSV into the normalized DB
      # that the alias-mapper CLI reads from.
      - name: Build SQLite database from TSV
        run: python scripts/build_alias_db.py --tsv aliases.tsv.gz --db aliases.db

      # Step 7: Gzip the SQLite DB to reduce the Release asset size.
      # SQLite files compress well (typically 3-4x), making downloads faster.
      # failures.tsv is left uncompressed — it's small and more useful as
      # plain text (browser preview, quick inspection without downloading).
      - name: Compress the SQLite database
        run: gzip aliases.db

      # Step 8: Compute today's date in YYYY-MM-DD form, save it as a
      # variable the next step can use as the Release tag.
      - name: Compute Release tag
        id: tag
        run: echo "tag=data-$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # Step 9: Create a GitHub Release and attach the TSV, the gzipped
      # SQLite DB, and the per-assembly failures log. Users who want raw
      # tabular data grab the TSV; users who want the queryable DB grab
      # aliases.db.gz; users investigating collection issues grab
      # failures.tsv.
      - name: Publish data files as GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Alias data - ${{ steps.tag.outputs.tag }}"
          body: |
            Weekly snapshot of alias names for the 50 longest molecules of
            every eukaryotic genome assembly available on NCBI
            (GenBank + RefSeq).

            Assets:
              - `aliases.tsv.gz` — raw tabular data, gzipped.
              - `aliases.db.gz`  — SQLite database (normalized schema,
                indexed on accession), gzipped. Decompress before use:
                `gunzip aliases.db.gz`.
              - `failures.tsv`   — per-assembly failure log. One row per
                assembly that failed during collection, with categorical
                reason (e.g. `http_error`, `url_error`, `empty_report`)
                and detail message.

            Generated automatically by the `Weekly alias data update` workflow.
          files: |
            aliases.tsv.gz
            aliases.db.gz
            failures.tsv
