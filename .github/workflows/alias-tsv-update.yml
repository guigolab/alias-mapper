name: Chromosome+ data update (manual fallback)

# -- WHEN this workflow runs ------------------------------------------------
# Schedule REMOVED: the sharded full-set workflow
# (full-alias-update-sharded.yml) now owns the weekly Sunday slot and
# produces the full ~48k dataset. This lightweight Chromosome+ (~16k)
# job is kept only as a manually-runnable fallback — e.g. if the
# sharded run is failing and a quick partial dataset is needed. It is
# no longer scheduled, so it can't collide with the sharded run's
# `data-*` release tag.
on:
  # Manual trigger only — no cron.
  workflow_dispatch:

# -- PERMISSIONS this workflow needs ----------------------------------------
# By default, workflows can only read the repo. We need "write" so we can
# create a Release and upload the data files to it.
permissions:
  contents: write

# -- WHAT this workflow does ------------------------------------------------
jobs:
  build-data:
    runs-on: ubuntu-latest
    # Job timeout. The new summary-file-driven pipeline reads four NCBI
    # assembly_summary files instead of enumerating every assembly via
    # the `datasets` CLI, then fetches per-assembly reports in parallel.
    # Expected runtime is much lower than the v1 6+ hour budget; 6h is
    # a safe ceiling that won't bite us on a slow-NCBI day.
    timeout-minutes: 360
    steps:
      # Step 1: Pull the repo's code onto the runner so our scripts are available.
      - name: Check out repository
        uses: actions/checkout@v4

      # Step 2: Install Python 3.13 on the runner.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Step 3: Install Python dependencies.
      # - certifi: CA bundle for HTTPS verification (Ubuntu's system trust
      #   is fine for NCBI/GitHub, but certifi keeps the runner aligned
      #   with the local dev environment).
      # - truststore: harmless no-op on a runner with a normal cert chain;
      #   present so local and CI use the same code path.
      - name: Install Python dependencies
        run: pip install certifi truststore

      # Step 4: Run the collection script.
      # --no-cache forces the script to stream the four NCBI summary
      # files directly rather than persisting them to disk. The local
      # dev cache is a dev convenience only; CI always goes to source
      # so each run reflects the current state of NCBI's indexes.
      # Outputs three artifacts to the repo root:
      #   - aliases.tsv.gz   (merged-row per-assembly data, schema v2)
      #   - historical.tsv.gz (dead-accession lookup, used by CLI for
      #                       "this was suppressed by X" error messages)
      #   - failures.tsv     (per-assembly collection failure log)
      - name: Run alias collection script
        run: |
          python scripts/collect_aliases.py \
            --no-cache \
            --output aliases.tsv.gz \
            --failures failures.tsv \
            --historical-output historical.tsv.gz

      # Step 5: Compute today's date in YYYY-MM-DD form for the Release tag.
      - name: Compute Release tag
        id: tag
        run: echo "tag=data-$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # Step 6: Create a GitHub Release and attach the artifacts.
      # No DB asset: the client builds SQLite from the TSV on first run
      # via the CLI's bootstrap flow. Shipping a prebuilt DB would waste
      # space and bake in an SQLite version that may not match the
      # client's Python environment.
      - name: Publish data files as GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Alias data - ${{ steps.tag.outputs.tag }}"
          body: |
            Weekly snapshot of alias mappings for eukaryotic genome
            assemblies (GenBank + RefSeq), built from NCBI's four
            assembly_summary files.

            Assets:
              - `aliases.tsv.gz`     — merged-row per-assembly data
                (schema v2). One row per assembly; per-molecule data
                lives in comma-separated, position-aligned list
                columns. The CLI's bootstrap flow downloads this and
                builds a local SQLite cache on first run.
              - `historical.tsv.gz`  — dead-accession lookup with
                suppression dates and replacements where known. Used
                by the CLI to give useful error messages when a user
                references a suppressed/replaced accession.
              - `failures.tsv`       — per-assembly failure log. One
                row per assembly that failed during collection, with
                categorical reason and detail message.

            Generated automatically by the `Weekly alias data update`
            workflow.
          files: |
            aliases.tsv.gz
            historical.tsv.gz
            failures.tsv
